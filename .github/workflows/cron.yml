name: Cron (ReuniAI)

# Crons frequentes que o plano Hobby da Vercel não permite (limite de 1x/dia).
# Os endpoints validam Authorization: Bearer <CRON_SECRET>.
#
# Pré-requisito — defina em GitHub → Settings → Secrets and variables → Actions:
#   • APP_URL      = https://SEU-DOMINIO (sem barra no final)
#   • CRON_SECRET  = mesmo valor da env CRON_SECRET na Vercel
#
# Observação: o agendador do GitHub Actions é "best-effort" e pode atrasar
# alguns minutos em horários de pico. Para precisão de segundos, use Pro/cron-job.org.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

concurrency:
  group: reuniai-cron
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Acionar endpoints de cron
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -u
          if [ -z "${APP_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::Defina os secrets APP_URL e CRON_SECRET no repositório."
            exit 1
          fi

          failed=0
          for path in schedule-bots poll-bots meeting-prep calendar-sync; do
            url="${APP_URL%/}/api/cron/${path}"
            code=$(curl -s -m 60 -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer ${CRON_SECRET}" "${url}")
            echo "→ ${path}: HTTP ${code}"
            if [ "${code}" -ge 400 ] || [ "${code}" -eq 000 ]; then
              echo "::warning::${path} retornou ${code}"
              failed=1
            fi
          done
          exit $failed
